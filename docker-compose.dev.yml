# Dev overlay: backend hot-reload without rebuilding on every code change.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# Rebuild this service only when package.json / package-lock.json / Dockerfile.dev change:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml build user-service
# If dependencies change, refresh the named volume once:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml down
#   docker volume rm telegram-garant-contract-master_user_service_node_modules
#   (volume name may differ; use `docker volume ls`)

services:
  user-service:
    image: telegram-garant-contract-master-user-service:dev
    build:
      context: ./services/user-service
      dockerfile: Dockerfile.dev
    volumes:
      - ./services/user-service:/app
      - user_service_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      TELEGRAM_API_ROOT: ${TELEGRAM_API_ROOT:-}
      NO_PROXY: postgres,redis,localhost,127.0.0.1
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_MINIAPP_SLUG: ${TELEGRAM_MINIAPP_SLUG:-app}
      MINI_APP_URL: ${MINI_APP_URL:-}

volumes:
  user_service_node_modules:
